<!DOCTYPE html>
<html>
<head>
  <title>Weather Aggregator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌤️ Weather Aggregator</h1>
    <p class="subtitle">
      Check weather of any city!
    </p>
    <div class="search-box">
      <input type="text" 
        id="cityInput"
        placeholder="Enter city name...
        (eg: Delhi, Mumbai, London)">
      <button onclick="getWeather()">
        Search 🔍
      </button>
    </div>
    <div id="loading" class="loading">
      Fetching weather... ⏳
    </div>
    <div id="weatherCard" 
      class="weather-card">
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
