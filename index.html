<!DOCTYPE html>
<html>
<head>
  <title>Recipe Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🍳 Recipe Search Engine</h1>
    <p class="subtitle">
      Search any food recipe!
    </p>

    <div class="search-box">
      <input type="text" 
        id="searchInput"
        placeholder="Search recipe... 
        (eg: chicken, pasta, pizza)">
      <button onclick="searchRecipe()">
        Search 🔍
      </button>
    </div>

    <div id="loading" class="loading">
      Searching recipes... ⏳
    </div>

    <div id="results" 
      class="results-grid">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
